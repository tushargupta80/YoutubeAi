services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - backend/.env
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      OLLAMA_BASE_URL: http://ollama:11434
      VECTOR_INDEX_DIR: /app/backend/data/faiss
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - faiss_data:/app/backend/data/faiss

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      OLLAMA_BASE_URL: http://ollama:11434
      VECTOR_INDEX_DIR: /app/backend/data/faiss
    depends_on:
      - backend
      - redis
      - postgres
      - ollama
    volumes:
      - faiss_data:/app/backend/data/faiss

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: youtube_notes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
  faiss_data:
